<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tracker">
<title>Personal Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0e1117;color:#dde6f0;font-family:-apple-system,'Inter',sans-serif;min-height:100vh;padding-bottom:90px;padding-top:env(safe-area-inset-top);overflow-x:hidden}
input,select,button,textarea{font-family:inherit;outline:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

:root{
  --bg:#0e1117;--bg2:#151b24;--bg3:#1c2433;
  --mint:#6ee7b7;--mint2:#34d399;--mint3:#10b981;
  --sky:#93c5fd;--sky2:#60a5fa;--sky3:#3b82f6;
  --lilac:#c4b5fd;--lilac2:#a78bfa;--lilac3:#8b5cf6;
  --peach:#fca5a5;--peach2:#f87171;
  --sand:#fde68a;--sand2:#fbbf24;
  --slate:#8899aa;--slate2:#55667a;
  --border:rgba(255,255,255,.06);
  --card:rgba(255,255,255,.03);
}

/* blobs */
.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.b1{top:-120px;left:-100px;width:340px;height:340px;background:radial-gradient(circle,rgba(110,231,183,.1) 0%,transparent 65%)}
.b2{top:300px;right:-100px;width:280px;height:280px;background:radial-gradient(circle,rgba(147,197,253,.08) 0%,transparent 65%)}
.b3{bottom:160px;left:15%;width:240px;height:240px;background:radial-gradient(circle,rgba(196,181,253,.07) 0%,transparent 65%)}

/* ── TOAST NOTIFICATION ── */
#toast{position:fixed;top:calc(env(safe-area-inset-top) + 16px);left:50%;transform:translateX(-50%) translateY(-80px);z-index:9999;background:#1c2433;border:1px solid rgba(110,231,183,.3);border-radius:16px;padding:12px 20px;font-size:13px;font-weight:600;color:var(--mint);display:flex;align-items:center;gap:9px;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast .t-icon{font-size:18px}

.wrap{position:relative;z-index:1;padding:0 14px}
.hdr{padding:22px 16px 0;position:relative;z-index:1}
.hdr h1{font-size:20px;font-weight:800;letter-spacing:-.5px;color:var(--mint)}
.hdr p{font-size:11px;color:var(--slate2);margin-top:3px}

/* cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:15px;margin-bottom:11px;backdrop-filter:blur(8px)}
.card-mint{background:linear-gradient(135deg,rgba(110,231,183,.08),rgba(147,197,253,.06))}
.card-lilac{background:linear-gradient(135deg,rgba(196,181,253,.09),rgba(147,197,253,.06))}
.card-sand{background:linear-gradient(135deg,rgba(253,230,138,.07),rgba(110,231,183,.05))}

.sec-title{font-size:12px;font-weight:700;color:var(--slate);letter-spacing:.5px;margin-bottom:10px}
.lbl{font-size:10px;color:var(--slate2);font-weight:700;letter-spacing:.7px;margin-bottom:5px}

.inp{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:11px;padding:10px 13px;color:#dde6f0;font-size:14px;margin-bottom:11px;transition:border .2s}
.inp:focus{border-color:rgba(110,231,183,.35)}
select.inp option{background:#151b24}

/* pill grids */
.pg2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.pg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px}
.pg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px;margin-bottom:12px}
.pill-btn{border:1px solid var(--border);background:rgba(255,255,255,.03);border-radius:11px;padding:9px 5px;font-size:11px;font-weight:600;color:var(--slate);cursor:pointer;text-align:center;transition:all .15s;line-height:1.3}
.pill-btn.sel{border-color:var(--mint2);background:rgba(52,211,153,.12);color:var(--mint)}
.pill-btn .pi{font-size:18px;display:block;margin-bottom:3px}

/* buttons */
.btn{width:100%;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.98);opacity:.85}
.btn-mint{background:linear-gradient(135deg,var(--mint2),var(--sky2));color:#0e1117}
.btn-sky{background:linear-gradient(135deg,var(--sky2),var(--lilac2));color:#0e1117}
.btn-lilac{background:linear-gradient(135deg,var(--lilac2),var(--sky2));color:#0e1117}
.btn-peach{background:linear-gradient(135deg,var(--peach2),var(--peach));color:#0e1117}
.btn-sand{background:linear-gradient(135deg,var(--sand2),var(--sand));color:#0e1117}
.btn-ghost{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--slate)}

/* nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(14,17,23,.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0;padding-bottom:max(14px,env(safe-area-inset-bottom));z-index:100}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;opacity:.3;transition:opacity .2s;min-width:52px}
.nav-btn.active{opacity:1}
.nav-icon{font-size:21px}
.nav-lbl{font-size:10px;color:var(--slate2);font-weight:600}
.nav-btn.active .nav-lbl{color:var(--mint)}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--mint2)}

/* history */
.hist{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.hist-ico{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.hist-info{flex:1;min-width:0}
.hist-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-sub{font-size:11px;color:var(--slate2);margin-top:1px}
.tag{display:inline-block;border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;white-space:nowrap}

.sec-title{font-size:12px;font-weight:700;color:var(--slate);letter-spacing:.4px;margin-bottom:9px;padding-left:1px}
.empty{color:var(--slate2);font-size:13px;text-align:center;padding:32px 0}
.saran-box{font-size:13px;line-height:1.85;white-space:pre-wrap}
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.macro-box{background:rgba(255,255,255,.04);border-radius:9px;padding:7px;text-align:center}
.macro-val{font-size:15px;font-weight:800}
.macro-lbl{font-size:9px;color:var(--slate2);margin-top:1px}

/* ── FINANCE SPECIFIC ── */
.fin-hero{background:linear-gradient(145deg,#151b24,#1a2030);border:1px solid rgba(110,231,183,.12);border-radius:22px;padding:20px;margin-bottom:11px;position:relative;overflow:hidden}
.fin-hero::before{content:"";position:absolute;top:-60px;right:-60px;width:180px;height:180px;background:radial-gradient(circle,rgba(110,231,183,.12) 0%,transparent 70%);pointer-events:none}
.fin-bal{font-size:34px;font-weight:800;letter-spacing:-1px;margin:6px 0 2px}
.fin-row{display:flex;gap:0;margin-top:14px}
.fin-stat{flex:1;padding:12px 14px;background:rgba(255,255,255,.03);border-radius:14px}
.fin-stat+.fin-stat{margin-left:8px}
.fin-stat-lbl{font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--slate2);margin-bottom:4px}
.fin-stat-val{font-size:17px;font-weight:800}

/* input numpad feel */
.amt-hero{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;text-align:center}
.amt-big{font-size:38px;font-weight:800;letter-spacing:-1px;color:#dde6f0;min-height:50px;line-height:1}
.amt-sub{font-size:12px;color:var(--slate2);margin-top:4px}
.cat-pill{border:1px solid var(--border);background:rgba(255,255,255,.03);border-radius:12px;padding:10px 8px;font-size:11px;font-weight:600;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s;color:var(--slate)}
.cat-pill.sel{border-color:rgba(110,231,183,.4);background:rgba(52,211,153,.1);color:var(--mint)}
.cat-pill .ce{font-size:20px}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:13px}

/* progress rings */
.ring-wrap{display:flex;align-items:center;justify-content:center;position:relative}
.ring-label{position:absolute;text-align:center}

/* Spending breakdown horizontal bars */
.spend-bar{margin-bottom:10px}
.spend-bar-lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.spend-track{background:rgba(255,255,255,.05);border-radius:6px;height:7px;overflow:hidden}
.spend-fill{height:7px;border-radius:6px;transition:width .6s cubic-bezier(.34,1.2,.64,1)}

/* trend chip */
.trend-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.trend-up{background:rgba(110,231,183,.12);color:var(--mint)}
.trend-dn{background:rgba(248,113,113,.12);color:var(--peach2)}
</style>
</head>

  <button class="nav-btn" onclick="switchTab('Keuangan')"><span class="nav-icon">💸</span><span class="nav-lbl">Keuangan</span><span class="nav-dot" id="dot-Keuangan" style="display:none"></span></button>

  <button class="nav-btn" onclick="switchTab('Makan')"><span class="nav-icon">🍜</span><span class="nav-lbl">Makan</span><span class="nav-dot" id="dot-Makan" style="display:none"></span></button>

</nav>

let toastTimer;
function showToast(msg,icon="✅"){
  const t=document.getElementById("toast");

  t.querySelector(".t-icon").textContent=icon;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2500);
}

// ══ STATS ══════════════════════════════════
function stats(){
  const now=new Date(),d30=new Date(now-30*864e5).toISOString().split("T")[0],d7=new Date(now-7*864e5).toISOString().split("T")[0];
  const fin30=finance.filter(f=>f.date>=d30);
  const inc=fin30.filter(f=>f.type==="Pemasukan").reduce((s,f)=>s+f.amount,0);
  const exp=fin30.filter(f=>f.type==="Pengeluaran").reduce((s,f)=>s+f.amount,0);
  const expByCat={};fin30.filter(f=>f.type==="Pengeluaran").forEach(f=>{expByCat[f.category]=(expByCat[f.category]||0)+f.amount});
  const gym30=gym.filter(g=>g.date>=d30);
  const meals7=meals.filter(m=>m.date>=d7);
  const dc=Math.max(1,[...new Set(meals7.map(m=>m.date))].length);
  const avgCal=Math.round(meals7.reduce((s,m)=>s+m.totalCal,0)/dc);
  const avgProt=Math.round(meals7.reduce((s,m)=>s+(m.totalProt||0),0)/dc);
  const topCat=Object.entries(expByCat).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const totalBurned=gym30.reduce((s,g)=>s+(g.burned||0),0);
  // prev 30 day expense for trend
  const d60=new Date(now-60*864e5).toISOString().split("T")[0];
  const prevExp=finance.filter(f=>f.date>=d60&&f.date<d30&&f.type==="Pengeluaran").reduce((s,f)=>s+f.amount,0);
  const expTrend=prevExp>0?Math.round((exp-prevExp)/prevExp*100):0;
  const days7=Array.from({length:7},(_,i)=>{
    const d=new Date(now-(6-i)*864e5).toISOString().split("T")[0];
    return{d,label:fmtD(d).split(" ")[0],
      spend:finance.filter(f=>f.date===d&&f.type==="Pengeluaran").reduce((s,f)=>s+f.amount,0),
      income:finance.filter(f=>f.date===d&&f.type==="Pemasukan").reduce((s,f)=>s+f.amount,0),
      gymMin:gym.filter(g=>g.date===d).reduce((s,g)=>s+g.duration,0),
      cal:meals.filter(m=>m.date===d).reduce((s,m)=>s+m.totalCal,0),
      prot:meals.filter(m=>m.date===d).reduce((s,m)=>s+(m.totalProt||0),0),
    };
  });
  return{inc,exp,bal:inc-exp,expByCat,gym30,avgCal,avgProt,topCat,totalBurned,days7,lastGym:gym[0]?.date?fmtD(gym[0].date):null,expTrend};
}

// ══ CHART ══════════════════════════════════
function drawLine(id,data,color){
  const c=document.getElementById(id);if(!c)return;
  const W=c.offsetWidth||320,H=c.offsetHeight||90;
  c.width=W;c.height=H;
  const ctx=c.getContext("2d");
  ctx.clearRect(0,0,W,H);
  const vals=data.map(d=>d.v),max=Math.max(...vals,1);
  const pad={t:8,b:20,l:6,r:6};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  if(data.length<2)return;
  // grid
  [0,.5,1].forEach(p=>{
    const y=pad.t+iH*(1-p);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);
    ctx.strokeStyle="rgba(255,255,255,.035)";ctx.lineWidth=1;ctx.setLineDash([3,7]);ctx.stroke();ctx.setLineDash([]);
  });
  const pts=data.map((d,i)=>({x:pad.l+i/(data.length-1)*iW,y:pad.t+iH*(1-d.v/max),v:d.v,label:d.label}));
  // area
  const g2=ctx.createLinearGradient(0,pad.t,0,H);
  g2.addColorStop(0,color+"38");g2.addColorStop(1,color+"00");
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){const mx=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(mx,pts[i-1].y,mx,pts[i].y,pts[i].x,pts[i].y)}
  ctx.lineTo(pts[pts.length-1].x,H-pad.b);ctx.lineTo(pts[0].x,H-pad.b);ctx.closePath();ctx.fillStyle=g2;ctx.fill();
  // glow line
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){const mx=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(mx,pts[i-1].y,mx,pts[i].y,pts[i].x,pts[i].y)}
  ctx.strokeStyle=color+"50";ctx.lineWidth=6;ctx.stroke();
  // main line
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){const mx=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(mx,pts[i-1].y,mx,pts[i].y,pts[i].x,pts[i].y)}
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
  // dots
  pts.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fillStyle="#0e1117";ctx.fill();
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
    if(p.label){ctx.fillStyle="#55667a";ctx.font="9px -apple-system";ctx.textAlign="center";ctx.fillText(p.label,p.x,H-3)}
  });
}
function drawDonut(id,data){
  const c=document.getElementById(id);if(!c)return;
  const ctx=c.getContext("2d"),W=c.width,H=c.height,r=W*.36,cx=W/2,cy=H/2;
  ctx.clearRect(0,0,W,H);
  const total=data.reduce((s,d)=>s+d.v,0)||1;let start=-Math.PI/2;
  data.forEach(d=>{
    const a=(d.v/total)*Math.PI*2*.94;
    ctx.beginPath();ctx.arc(cx,cy,r,start,start+a);
    ctx.strokeStyle=d.color;ctx.lineWidth=14;ctx.lineCap="round";ctx.stroke();
    start+=a+.04;
  });
  ctx.beginPath();ctx.arc(cx,cy,r*.58,0,Math.PI*2);ctx.fillStyle="#0e1117";ctx.fill();
  ctx.fillStyle="#dde6f0";ctx.font="bold 13px -apple-system";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(data.length,cx,cy-6);
  ctx.fillStyle="#55667a";ctx.font="8px -apple-system";ctx.fillText("kat.",cx,cy+8);
}

  let h=`<div style="height:14px"></div>
  <div class="card"><div class="sec-title">🏋️ Jenis Latihan</div><div class="pg3">${gymTypes}</div></div>
  <div style="background:rgba(196,181,253,.07);border:1px solid rgba(196,181,253,.18);border-radius:16px;padding:14px;margin-bottom:11px">
    <div style="font-size:11px;font-weight:700;color:#c4b5fd;letter-spacing:.6px;margin-bottom:10px">📋 INFO — ${gType.toUpperCase()}</div>
    <div style="font-size:12px;color:#d4c5fd;margin-bottom:6px">📌 ${g.desc}</div>
    <div style="font-size:12px;color:#d4c5fd;margin-bottom:4px">📊 ${g.reps} &nbsp;·&nbsp; ⏳ Istirahat: ${g.rest}</div>
    <div style="font-size:12px;color:#c4b5fd;margin-bottom:10px">💡 ${g.tip}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:var(--bg2);border-radius:11px;padding:10px;text-align:center"><div style="font-size:9px;color:#55667a;font-weight:700">ESTIMASI BAKAR</div><div style="font-size:20px;font-weight:800;color:#c4b5fd">${estLow}–${estHigh}</div><div style="font-size:10px;color:#8899aa">kkal</div></div>
      <div style="background:var(--bg2);border-radius:11px;padding:10px;text-align:center"><div style="font-size:9px;color:#55667a;font-weight:700">RATA-RATA</div><div style="font-size:20px;font-weight:800;color:#c4b5fd">~${estMid}</div><div style="font-size:10px;color:#8899aa">kkal</div></div>
    </div>
    <div style="font-size:10px;color:#4b5563;margin-top:8px">📚 Compendium of Physical Activities (Ainsworth 2011) · BB 70kg</div>
  </div>
  <div class="card">
    <div class="sec-title">⏱️ Durasi</div><div class="pg4">${durPills}</div>
    <div class="sec-title">💥 Intensitas</div><div class="pg4">${intPills}</div>
    <div class="sec-title">😊 Mood</div><div class="pg4">${moodPills}</div>
    <div class="lbl">CATATAN</div>
    <input id="gNote" class="inp" placeholder="Beban, set, reps...">
    <div class="lbl">TANGGAL</div>
    <input id="gDate" class="inp" type="date" value="${today()}">
    <button class="btn btn-lilac" onclick="addGym()">+ Catat Sesi Gym</button>
  </div>
  <div class="card"><div class="sec-title">📊 Durasi 7 Hari</div><canvas id="ch-gym2" style="width:100%;height:80px;display:block"></canvas></div>
  <div class="sec-title">Riwayat</div>`;
  if(!gym.length)h+=`<div class="empty">Ayo mulai gym! 💪</div>`;
  gym.slice(0,30).forEach(g2=>{
    const gi=GYM_DATA[g2.type]||GYM_DATA["Full Body"];
    h+=`<div class="card hist"><div class="hist-ico" style="background:rgba(196,181,253,.1)">${gi.icon}</div><div class="hist-info"><div class="hist-title">${g2.type} · ${g2.intensity||"Sedang"} · ${g2.mood||""}</div><div class="hist-sub">${g2.note?g2.note+" · ":""}${fmtD(g2.date)}</div><div style="font-size:11px;color:#a78bfa;margin-top:2px">🔥 ~${g2.burned||0} kkal</div></div><span class="tag" style="background:rgba(196,181,253,.1);color:#c4b5fd">${g2.duration} mnt</span></div>`;
  });
  document.getElementById("page-Gym").innerHTML=h;
  requestAnimationFrame(()=>drawLine("ch-gym2",s.days7.map(d=>({v:d.gymMin,label:d.label})),"#93c5fd"));
}
function setGType(t){gType=t;render("Gym")}
function setGInt(i){gIntensity=i;render("Gym")}
function setGMood(i){gMood=i;render("Gym")}
function setGDur(d){gDur=d;render("Gym")}
function addGym(){
  const g=GYM_DATA[gType];
  const burned=Math.round(gDur*(g.low+g.high)/2*GYM_INTENSITY_MULT[gIntensity]);
  gym.unshift({id:Date.now(),type:gType,duration:gDur,intensity:GYM_INTENSITY[gIntensity],mood:MOOD_OPTS[gMood],note:document.getElementById("gNote").value,date:document.getElementById("gDate").value,burned});
  save();
  showToast(`Sesi ${gType} ${gDur} mnt dicatat! 🔥 ~${burned} kkal`,"💪");
  render("Gym");
}

// ══ MAKAN ══════════════════════════════════
function rMakan(s){
  let groupHtml="";
  for(const[grp,items] of Object.entries(FOOD_GROUPS)){
    const btns=items.map(n=>`<button class="pill-btn ${selFood===n?"sel":""}" onclick="pickFood('${n}')">${n}</button>`).join("");
    groupHtml+=`<div style="margin-bottom:11px"><div style="font-size:11px;color:#55667a;font-weight:700;margin-bottom:6px">${grp}</div><div class="pg3">${btns}</div></div>`;
  }
  const fd=selFood?FOOD_DB[selFood]:null;
  const isUnit=fd&&fd[5]!=="gram"&&fd[5]!=="ml";
  const unitLabel=fd?fd[5]:"gram";
  const defQty=isUnit?1:100;
  const pqLabel={"complete":"✅ Protein Lengkap","partial":"🟡 Protein Sebagian","plant":"🌱 Protein Nabati"}[fd?.[7]]||"";

  let calcSection="";
  if(fd){
    calcSection=`<div style="background:rgba(110,231,183,.07);border:1px solid rgba(110,231,183,.2);border-radius:16px;padding:14px;margin-bottom:11px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:13px;font-weight:700;color:var(--mint)">${selFood}</div>
        <span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:rgba(110,231,183,.12);color:#6ee7b7">${pqLabel}</span>
      </div>
      <div style="font-size:11px;color:#55667a;margin-bottom:10px">📚 Sumber: ${fd[6]}</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="flex:1"><div class="lbl">JUMLAH (${unitLabel.toUpperCase()})</div><input id="foodQty" class="inp" type="number" inputmode="numeric" value="${defQty}" oninput="calcFood(this.value)" style="margin-bottom:0"></div>
      </div>
      <div id="foodCalcResult" class="macro-grid"></div>
      <button class="btn btn-mint" style="margin-top:11px" onclick="addFoodToMeal()">➕ Tambah ke Log Makan</button>
    </div>`;
  }

  // total items
  let itemsHtml="";
  if(mealItems.length){
    const totCal=mealItems.reduce((s,x)=>s+x.cal,0);
    const totP=mealItems.reduce((s,x)=>s+x.p,0);
    const totC=mealItems.reduce((s,x)=>s+x.c,0);
    const totF=mealItems.reduce((s,x)=>s+x.f,0);
    const protPct=Math.min(100,Math.round(totP/PROTEIN_DAILY_GOAL*100));
    itemsHtml=`<div class="card card-mint">
      <div class="sec-title">🧾 Makanan Dipilih</div>
      ${mealItems.map((x,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
        <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${x.name}</div>
        <div style="font-size:11px;color:#55667a">${x.gram}${x.unit} · P:<span style="color:#6ee7b7">${x.p.toFixed(1)}g</span> K:${x.c.toFixed(1)}g L:${x.f.toFixed(1)}g</div></div>
        <div style="display:flex;align-items:center;gap:7px;flex-shrink:0">
          <span class="tag" style="background:rgba(253,230,138,.12);color:#fde68a">${Math.round(x.cal)} kkal</span>
          <button onclick="removeFoodItem(${i})" style="background:rgba(252,165,165,.12);border:none;color:#fca5a5;border-radius:8px;padding:4px 8px;cursor:pointer;font-size:12px">✕</button>
        </div>
      </div>`).join("")}
      <div style="margin-top:11px">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <div class="macro-grid" style="flex:1;margin-top:0">
            <div class="macro-box"><div class="macro-val" style="color:#fde68a">${Math.round(totCal)}</div><div class="macro-lbl">kkal</div></div>
            <div class="macro-box"><div class="macro-val" style="color:#6ee7b7">${totP.toFixed(1)}</div><div class="macro-lbl">Protein</div></div>
            <div class="macro-box"><div class="macro-val" style="color:#93c5fd">${totC.toFixed(1)}</div><div class="macro-lbl">Karbo</div></div>
            <div class="macro-box"><div class="macro-val" style="color:#fca5a5">${totF.toFixed(1)}</div><div class="macro-lbl">Lemak</div></div>
          </div>
        </div>
        <div style="margin-top:6px">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span style="color:#6ee7b7">Protein ${totP.toFixed(1)}g / target ${PROTEIN_DAILY_GOAL}g/hari</span><span style="color:#55667a">${protPct}%</span></div>
          <div style="background:rgba(255,255,255,.06);border-radius:6px;height:6px"><div style="width:${protPct}%;background:linear-gradient(90deg,#34d399,#6ee7b7);border-radius:6px;height:6px;transition:width .4s"></div></div>
        </div>
      </div>
    </div>`;
  }

  const timePills=MEAL_TIMES.map(t=>`<button class="pill-btn ${mTime===t?"sel":""}" onclick="setMTime('${t}')">${MEAL_EMOJI[t]} ${t}</button>`).join("");

  let h=`<div style="height:14px"></div>
  <div class="card">
    <div class="sec-title">🕐 Waktu Makan</div>
    <div class="pg4">${timePills}</div>
    <div class="sec-title" style="margin-top:4px">🍱 Pilih Makanan</div>
    ${groupHtml}
  </div>
  ${calcSection}${itemsHtml}
  ${mealItems.length?`<div class="card"><div class="lbl">TANGGAL</div><input id="mDate" class="inp" type="date" value="${today()}"><button class="btn btn-sand" onclick="saveMeal()">💾 Simpan Log Makan</button><button class="btn btn-ghost" style="margin-top:8px" onclick="clearMeal()">🗑 Reset</button></div>`:""}
  <div class="card"><div class="sec-title">📊 Kalori & Protein 7 Hari</div><canvas id="ch-cal2" style="width:100%;height:80px;display:block"></canvas><div style="font-size:11px;color:#55667a;margin:8px 0 4px">Protein (g)</div><canvas id="ch-prot2" style="width:100%;height:70px;display:block"></canvas></div>
  <div class="sec-title">Riwayat Makan</div>`;
  if(!meals.length)h+=`<div class="empty">Belum ada log makan 🍽️</div>`;
  meals.slice(0,30).forEach(m=>{
    const prot=m.totalProt?`<div style="font-size:11px;color:#6ee7b7;margin-top:2px">🥩 ${m.totalProt.toFixed(1)}g protein</div>`:"";
    h+=`<div class="card hist"><div class="hist-ico" style="background:rgba(253,230,138,.1)">${MEAL_EMOJI[m.time]||"🍽️"}</div><div class="hist-info"><div class="hist-title">${m.items?m.items.map(x=>x.name).join(", "):"Makanan"}</div><div class="hist-sub">${m.time} · ${fmtD(m.date)}</div>${prot}</div>${m.totalCal?`<span class="tag" style="background:rgba(253,230,138,.1);color:#fde68a">${m.totalCal} kkal</span>`:""}</div>`;
  });
  document.getElementById("page-Makan").innerHTML=h;
  requestAnimationFrame(()=>{
    drawLine("ch-cal2",s.days7.map(d=>({v:d.cal,label:d.label})),"#fde68a");
    drawLine("ch-prot2",s.days7.map(d=>({v:d.prot,label:d.label})),"#6ee7b7");
    if(selFood)calcFood(isUnit?1:defQty);
  });
}
function pickFood(n){selFood=n;render("Makan")}
function calcFood(qty){
  const fd=FOOD_DB[selFood];if(!fd)return;
  const el=document.getElementById("foodCalcResult");if(!el)return;
  const q=parseFloat(qty)||0;
  const unitG=FOOD_UNIT_G[selFood]||100;
  const mult=fd[5]==="gram"||fd[5]==="ml"?q/100:q*unitG/100;
  const cal=fd[0]*mult,p=fd[1]*mult,c=fd[2]*mult,f=fd[3]*mult;
  el.innerHTML=`<div class="macro-box"><div class="macro-val" style="color:#fde68a">${cal.toFixed(0)}</div><div class="macro-lbl">kkal</div></div><div class="macro-box"><div class="macro-val" style="color:#6ee7b7">${p.toFixed(1)}</div><div class="macro-lbl">Protein</div></div><div class="macro-box"><div class="macro-val" style="color:#93c5fd">${c.toFixed(1)}</div><div class="macro-lbl">Karbo</div></div><div class="macro-box"><div class="macro-val" style="color:#fca5a5">${f.toFixed(1)}</div><div class="macro-lbl">Lemak</div></div>`;
}
function addFoodToMeal(){
  const fd=FOOD_DB[selFood];if(!fd)return;
  const qty=parseFloat(document.getElementById("foodQty")?.value)||1;
  const unitG=FOOD_UNIT_G[selFood]||100;
  const mult=fd[5]==="gram"||fd[5]==="ml"?qty/100:qty*unitG/100;
  mealItems.push({name:selFood,gram:qty,unit:fd[5],cal:fd[0]*mult,p:fd[1]*mult,c:fd[2]*mult,f:fd[3]*mult});
  showToast(`${selFood} ditambahkan! 🥗`,"✅");
  selFood="";render("Makan");
}
function removeFoodItem(i){mealItems.splice(i,1);render("Makan")}
function clearMeal(){mealItems=[];render("Makan")}
function setMTime(t){mTime=t;render("Makan")}
function saveMeal(){
  if(!mealItems.length)return;
  const totalCal=Math.round(mealItems.reduce((s,x)=>s+x.cal,0));
  const totalProt=parseFloat(mealItems.reduce((s,x)=>s+x.p,0).toFixed(1));
  const dateEl=document.getElementById("mDate");
  meals.unshift({id:Date.now(),time:mTime,items:[...mealItems],totalCal,totalProt,date:dateEl?.value||today()});
  const protMsg=totalProt>0?` · ${totalProt}g protein`:"";
  showToast(`Log ${mTime} disimpan! ${totalCal} kkal${protMsg}`,"🍜");
  mealItems=[];save();render("Makan");
}

// ══ SARAN ══════════════════════════════════
function rSaran(s){
  let h=`<div style="height:14px"></div>
  <div class="card card-mint">
    <div class="sec-title">🔑 Anthropic API Key</div>
    <input id="apiKeyInput" class="inp" type="password" placeholder="sk-ant-..." value="${localStorage.getItem("pt_apikey")||""}">
    <p style="font-size:11px;color:#55667a;margin-top:4px;line-height:1.6">Key tersimpan di device kamu. Dapatkan di <a href="https://console.anthropic.com" target="_blank" style="color:#6ee7b7">console.anthropic.com</a></p>
    <button class="btn btn-mint" style="margin-top:11px" onclick="saveKey()">💾 Simpan Key</button>
  </div>
  <div class="card card-lilac">
    <div class="sec-title">✨ Saran Personal AI</div>
    <div style="font-size:12px;color:#8899aa;margin-bottom:13px">AI analisis data kamu dan kasih saran actionable.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px">
      <div style="background:var(--bg2);border-radius:12px;padding:11px"><div class="lbl">SALDO</div><div style="font-size:13px;font-weight:700;color:${s.bal>=0?"#6ee7b7":"#fca5a5"};margin-top:3px">${fmtIDR(s.bal)}</div></div>
      <div style="background:var(--bg2);border-radius:12px;padding:11px"><div class="lbl">GYM 30H</div><div style="font-size:13px;font-weight:700;color:#93c5fd;margin-top:3px">${s.gym30.length}x</div></div>
      <div style="background:var(--bg2);border-radius:12px;padding:11px"><div class="lbl">KALORI RATA</div><div style="font-size:13px;font-weight:700;color:#fde68a;margin-top:3px">${s.avgCal||0} kkal</div></div>
      <div style="background:var(--bg2);border-radius:12px;padding:11px"><div class="lbl">PROTEIN RATA</div><div style="font-size:13px;font-weight:700;color:#6ee7b7;margin-top:3px">${s.avgProt||0}g</div></div>
    </div>
    <button class="btn btn-lilac" id="saranBtn" onclick="mintaSaran()">✨ Minta Saran AI</button>
  </div>
  <div id="saranResult"></div>`;
  document.getElementById("page-Saran").innerHTML=h;
}
function saveKey(){const k=document.getElementById("apiKeyInput").value.trim();if(!k)return;localStorage.setItem("pt_apikey",k);showToast("API key tersimpan!","🔑")}
async function mintaSaran(){
  const key=localStorage.getItem("pt_apikey")||"";
  if(!key){showToast("Masukkan API key dulu!","⚠️");return}
  const btn=document.getElementById("saranBtn");btn.textContent="⏳ Menganalisis...";btn.disabled=true;
  const s=stats();
  const recentMeals=meals.slice(0,5).map(m=>m.items?m.items.map(x=>x.name).join(", "):"").join("; ");
  const prompt=`Kamu asisten kesehatan & keuangan personal Gen Z Indonesia. Bahasa informal, relatable, actionable. Berikan 4 saran spesifik berdasarkan:
Keuangan (30h): Masuk ${fmtIDR(s.inc)}, Keluar ${fmtIDR(s.exp)}, Saldo ${fmtIDR(s.bal)}, Top spend: ${s.topCat||"-"}
Gym (30h): ${s.gym30.length} sesi, total bakar ~${s.totalBurned} kkal
Nutrisi (7h): ${s.avgCal||0} kkal/hari, protein ${s.avgProt||0}g/hari (target 50g)
Makanan terakhir: ${recentMeals||"belum ada"}
Format: 4 bullet poin, emoji relevan di awal, maks 2 kalimat per poin.`;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    const txt=data.content?.[0]?.text||"Tidak dapat memuat saran.";
    document.getElementById("saranResult").innerHTML=`<div class="card card-mint"><div style="font-size:13px;font-weight:700;color:#6ee7b7;margin-bottom:11px">💡 Saran untuk kamu</div><div class="saran-box">${txt}</div></div>`;
  }catch(e){document.getElementById("saranResult").innerHTML=`<div class="card"><div style="color:#fca5a5;font-size:13px">Error: ${e.message}</div></div>`}
  btn.textContent="✨ Minta Saran AI";btn.disabled=false;
}

render("Dashboard");
</script>
</body>
</html>
