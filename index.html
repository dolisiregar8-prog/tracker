<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tracker">
<title>Personal Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,'Inter',sans-serif;min-height:100vh;padding-bottom:90px;padding-top:env(safe-area-inset-top)}
input,select,button,textarea{font-family:inherit;outline:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* ── PALETTE ── calming teal/sage/slate */
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;
  --teal:#2dd4bf;--teal2:#14b8a6;--teal3:#0d9488;
  --sage:#86efac;--sage2:#4ade80;
  --sky:#7dd3fc;--sky2:#38bdf8;
  --lavender:#c4b5fd;--lavender2:#a78bfa;
  --rose:#fda4af;--rose2:#fb7185;
  --amber:#fcd34d;--amber2:#fbbf24;
  --slate:#94a3b8;--slate2:#64748b;
  --border:rgba(255,255,255,.07);
  --card:rgba(255,255,255,.03);
}

.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
.b1{top:-100px;left:-80px;width:320px;height:320px;background:radial-gradient(circle,rgba(45,212,191,.12) 0%,transparent 65%)}
.b2{top:250px;right:-80px;width:260px;height:260px;background:radial-gradient(circle,rgba(125,211,252,.09) 0%,transparent 65%)}
.b3{bottom:150px;left:20%;width:220px;height:220px;background:radial-gradient(circle,rgba(196,181,253,.08) 0%,transparent 65%)}

.wrap{position:relative;z-index:1;padding:0 14px}
.hdr{padding:22px 16px 0;position:relative;z-index:1}
.hdr h1{font-size:20px;font-weight:800;letter-spacing:-.5px;color:var(--teal)}
.hdr p{font-size:11px;color:var(--slate2);margin-top:3px}

/* cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:15px;margin-bottom:11px;backdrop-filter:blur(8px)}
.card-teal{background:linear-gradient(135deg,rgba(45,212,191,.1),rgba(125,211,252,.08))}
.card-sage{background:linear-gradient(135deg,rgba(134,239,172,.08),rgba(45,212,191,.06))}
.card-lavender{background:linear-gradient(135deg,rgba(196,181,253,.1),rgba(125,211,252,.06))}

.sec{font-size:12px;font-weight:700;color:var(--slate);letter-spacing:.5px;margin-bottom:11px;display:flex;align-items:center;gap:6px}
.lbl{font-size:10px;color:var(--slate2);font-weight:700;letter-spacing:.7px;margin-bottom:5px}

/* inputs */
.inp{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:11px;padding:10px 13px;color:#e6edf3;font-size:14px;margin-bottom:11px;transition:border .2s}
.inp:focus{border-color:rgba(45,212,191,.4)}
select.inp option{background:#161b22}

/* pill selectors */
.pill-grid{display:grid;gap:7px;margin-bottom:12px}
.pg2{grid-template-columns:1fr 1fr}
.pg3{grid-template-columns:1fr 1fr 1fr}
.pg4{grid-template-columns:1fr 1fr 1fr 1fr}
.pill-btn{border:1px solid var(--border);background:rgba(255,255,255,.04);border-radius:11px;padding:9px 6px;font-size:12px;font-weight:600;color:var(--slate);cursor:pointer;text-align:center;transition:all .15s;line-height:1.3}
.pill-btn.sel{border-color:var(--teal);background:rgba(45,212,191,.15);color:var(--teal)}
.pill-btn .pi{font-size:18px;display:block;margin-bottom:3px}

/* buttons */
.btn{width:100%;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;color:#0d1117;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-teal{background:linear-gradient(135deg,var(--teal),var(--sky2))}
.btn-sage{background:linear-gradient(135deg,var(--sage2),var(--teal))}
.btn-rose{background:linear-gradient(135deg,var(--rose2),var(--rose))}
.btn-lavender{background:linear-gradient(135deg,var(--lavender2),var(--sky2))}
.btn-amber{background:linear-gradient(135deg,var(--amber2),var(--amber))}

/* type toggle */
.type-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px}
.type-btn{padding:10px;border-radius:12px;font-weight:700;font-size:13px;cursor:pointer;border:1px solid var(--border);color:var(--slate);background:rgba(255,255,255,.04)}
.type-btn.ai{border-color:var(--sage2);background:rgba(74,222,128,.15);color:var(--sage2)}
.type-btn.ae{border-color:var(--rose2);background:rgba(251,113,133,.15);color:var(--rose2)}

/* stat cards */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px}
.stat-val{font-size:21px;font-weight:800;margin-top:3px}
.c-teal{color:var(--teal)}
.c-sage{color:var(--sage2)}
.c-sky{color:var(--sky2)}
.c-lavender{color:var(--lavender2)}
.c-rose{color:var(--rose2)}
.c-amber{color:var(--amber2)}
.c-slate{color:var(--slate)}

/* history */
.hist{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.hist-ico{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.hist-info{flex:1;min-width:0}
.hist-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-sub{font-size:11px;color:var(--slate2);margin-top:1px}
.tag{display:inline-block;border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;white-space:nowrap}

/* progress bar */
.bar-wrap{background:rgba(255,255,255,.06);border-radius:6px;height:6px;margin-top:5px}
.bar-fill{height:6px;border-radius:6px;transition:width .4s}

/* calorie calculator */
.cal-calc{background:rgba(45,212,191,.07);border:1px solid rgba(45,212,191,.18);border-radius:16px;padding:14px;margin-bottom:11px}
.cal-calc h4{font-size:11px;font-weight:700;color:var(--teal);letter-spacing:.6px;margin-bottom:11px}
.cal-result-box{background:var(--bg2);border-radius:12px;padding:12px;margin-top:10px;display:none}
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.macro-box{background:rgba(255,255,255,.04);border-radius:9px;padding:7px;text-align:center}
.macro-val{font-size:15px;font-weight:800}
.macro-lbl{font-size:9px;color:var(--slate2);margin-top:1px}

/* gym details */
.gym-detail{background:rgba(196,181,253,.07);border:1px solid rgba(196,181,253,.18);border-radius:16px;padding:14px;margin-bottom:11px}
.gym-detail h4{font-size:11px;font-weight:700;color:var(--lavender2);letter-spacing:.6px;margin-bottom:11px}
.burn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.burn-box2{background:var(--bg2);border-radius:11px;padding:10px;text-align:center}
.burn-val{font-size:20px;font-weight:800;color:var(--lavender2)}

/* nav */
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,17,23,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0;padding-bottom:max(14px,env(safe-area-inset-bottom));z-index:100}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;opacity:.35;transition:opacity .2s;min-width:52px}
.nav-btn.active{opacity:1}
.nav-icon{font-size:21px}
.nav-lbl{font-size:10px;color:var(--slate2);font-weight:600}
.nav-btn.active .nav-lbl{color:var(--teal)}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--teal)}

.sec-title{font-size:12px;font-weight:700;color:var(--slate);margin-bottom:9px;padding-left:2px;letter-spacing:.4px}
.empty{color:var(--slate2);font-size:13px;text-align:center;padding:32px 0}
.saran-box{font-size:13px;line-height:1.85;white-space:pre-wrap}
.api-note{font-size:11px;color:var(--slate2);margin-top:8px;line-height:1.6}
.api-note a{color:var(--teal)}
.divider{border:none;border-top:1px solid var(--border);margin:11px 0}

/* amt preview */
.amt-preview{font-size:26px;font-weight:800;color:var(--teal);letter-spacing:-.5px;margin-bottom:8px;min-height:36px}
</style>
</head>

  "Chest":    {low:5,high:8,met:4.0,icon:"🫁",desc:"Bench Press, Push-Up, Cable Fly, Dips",rest:"48–72 jam",reps:"3–4 set × 8–12 rep",tip:"Fokus squeeze di puncak gerakan"},

// ══════════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════════
function stats(){
  const now=new Date(),d30=new Date(now-30*864e5).toISOString().split("T")[0],d7=new Date(now-7*864e5).toISOString().split("T")[0];
  const fin30=finance.filter(f=>f.date>=d30);
  const inc=fin30.filter(f=>f.type==="Pemasukan").reduce((s,f)=>s+f.amount,0);
  const exp=fin30.filter(f=>f.type==="Pengeluaran").reduce((s,f)=>s+f.amount,0);
  const expByCat={};fin30.filter(f=>f.type==="Pengeluaran").forEach(f=>{expByCat[f.category]=(expByCat[f.category]||0)+f.amount});
  const gym30=gym.filter(g=>g.date>=d30);
  const meals7=meals.filter(m=>m.date>=d7);
  const dc=Math.max(1,[...new Set(meals7.map(m=>m.date))].length);
  const avgCal=Math.round(meals7.reduce((s,m)=>s+m.totalCal,0)/dc);
  const topCat=Object.entries(expByCat).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const totalBurned=gym.filter(g=>g.date>=d30).reduce((s,g)=>s+(g.burned||0),0);
  const days7=Array.from({length:7},(_,i)=>{
    const d=new Date(now-(6-i)*864e5).toISOString().split("T")[0];
    return{d,label:fmtD(d).split(" ")[0],
      spend:finance.filter(f=>f.date===d&&f.type==="Pengeluaran").reduce((s,f)=>s+f.amount,0),
      income:finance.filter(f=>f.date===d&&f.type==="Pemasukan").reduce((s,f)=>s+f.amount,0),
      gymMin:gym.filter(g=>g.date===d).reduce((s,g)=>s+g.duration,0),
      cal:meals.filter(m=>m.date===d).reduce((s,m)=>s+m.totalCal,0),
    };
  });
  return{inc,exp,bal:inc-exp,expByCat,gym30,avgCal,topCat,totalBurned,days7,lastGym:gym[0]?.date?fmtD(gym[0].date):null};
}

function drawLine(id,data,color,fillColor){

  const ctx=c.getContext("2d");
  // Use actual rendered size
  const W=c.offsetWidth||c.width,H=c.offsetHeight||c.height;
  c.width=W;c.height=H;
  ctx.clearRect(0,0,W,H);
  const vals=data.map(d=>d.v),max=Math.max(...vals,1),pad={t:10,b:22,l:8,r:8};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  if(data.length<2)return;

  // grid lines
  [0,.5,1].forEach(p=>{
    const y=pad.t+iH*(1-p);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);
    ctx.strokeStyle="rgba(255,255,255,.04)";ctx.lineWidth=1;ctx.setLineDash([4,6]);ctx.stroke();ctx.setLineDash([]);
  });

  const pts=data.map((d,i)=>({
    x:pad.l+i/(data.length-1)*iW,
    y:pad.t+iH*(1-d.v/max),v:d.v,label:d.label
  }));

  // area gradient
  const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,(fillColor||color)+"40");
  grad.addColorStop(1,(fillColor||color)+"00");
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){const mx=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(mx,pts[i-1].y,mx,pts[i].y,pts[i].x,pts[i].y)}
  ctx.lineTo(pts[pts.length-1].x,H-pad.b);ctx.lineTo(pts[0].x,H-pad.b);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();

  // line
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){const mx=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(mx,pts[i-1].y,mx,pts[i].y,pts[i].x,pts[i].y)}
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin="round";ctx.stroke();

  // glow
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){const mx=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(mx,pts[i-1].y,mx,pts[i].y,pts[i].x,pts[i].y)}
  ctx.strokeStyle=color+"55";ctx.lineWidth=5;ctx.stroke();

  // dots + labels
  pts.forEach((p,i)=>{
    ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,Math.PI*2);
    ctx.fillStyle="#0d1117";ctx.fill();
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
    if(p.label){ctx.fillStyle="#64748b";ctx.font="9px -apple-system";ctx.textAlign="center";ctx.fillText(p.label,p.x,H-4)}
  });
}

function drawDonut(id,data){
  const c=document.getElementById(id);if(!c)return;
  const ctx=c.getContext("2d"),W=c.width,H=c.height,r=W*.36,cx=W/2,cy=H/2;
  ctx.clearRect(0,0,W,H);
  const total=data.reduce((s,d)=>s+d.v,0)||1;
  let start=-Math.PI/2;
  // gap between slices
  data.forEach(d=>{
    const a=(d.v/total)*Math.PI*2*.95;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+a);ctx.closePath();
    ctx.fillStyle=d.color;ctx.fill();start+=a+(Math.PI*2*.05/data.length);
  });
  ctx.beginPath();ctx.arc(cx,cy,r*.62,0,Math.PI*2);ctx.fillStyle="#0d1117";ctx.fill();
  ctx.fillStyle="#e6edf3";ctx.font="bold 13px -apple-system";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(data.length,cx,cy-6);
  ctx.fillStyle="#64748b";ctx.font="8px -apple-system";ctx.fillText("kategori",cx,cy+8);
}

        <div style="display:flex;align-items:center;gap:8px">
          <span class="tag" style="background:rgba(252,211,77,.15);color:#fcd34d">${Math.round(x.cal)} kkal</span>
          <button onclick="removeFoodItem(${i})" style="background:rgba(253,164,175,.15);border:none;color:#fda4af;border-radius:8px;padding:4px 8px;cursor:pointer;font-size:12px">✕</button>
        </div>
      </div>`).join("")}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
        <div style="font-size:13px;font-weight:700">Total</div>
        <div class="macro-grid" style="gap:5px;margin-top:0">
          <div class="macro-box"><div class="macro-val c-amber">${Math.round(totCal)}</div><div class="macro-lbl">kkal</div></div>
          <div class="macro-box"><div class="macro-val c-sage">${totP.toFixed(1)}</div><div class="macro-lbl">P(g)</div></div>
          <div class="macro-box"><div class="macro-val c-sky">${totC.toFixed(1)}</div><div class="macro-lbl">K(g)</div></div>
          <div class="macro-box"><div class="macro-val c-rose">${totF.toFixed(1)}</div><div class="macro-lbl">L(g)</div></div>
        </div>
      </div>
    </div>`;
  }

  const timePills=MEAL_TIMES.map(t=>`<button class="pill-btn ${mTime===t?"sel":""}" onclick="setMTime('${t}')">${MEAL_EMOJI[t]} ${t}</button>`).join("");

  let h=`<div style="height:14px"></div>
  <div class="card">
    <div class="sec-title">🕐 Waktu Makan</div>
    <div class="pill-grid pg4">${timePills}</div>
    <div class="sec-title" style="margin-top:4px">🍱 Pilih Makanan</div>
    ${groupHtml}
  </div>
  ${calcSection}
  ${itemsHtml}
  ${mealItems.length?`
  <div class="card">
    <div class="lbl">TANGGAL</div>
    <input id="mDate" class="inp" type="date" value="${today()}">
    <button class="btn btn-amber" onclick="saveMeal()">💾 Simpan Log Makan</button>
    <button class="btn" style="background:rgba(253,164,175,.15);color:#fda4af;margin-top:8px" onclick="clearMeal()">🗑 Reset Pilihan</button>
  </div>`:""}
  <div class="card"><div class="sec-title">📊 Kalori 7 Hari</div><canvas id="ch-cal2" style="width:100%;height:80px;display:block"></canvas></div>
  <div class="sec-title">Riwayat Makan</div>`;

  if(!meals.length)h+=`<div class="empty">Belum ada log makan 🍽️</div>`;
  meals.slice(0,30).forEach(m=>{
    h+=`<div class="card hist">
      <div class="hist-ico" style="background:rgba(252,211,77,.1)">${MEAL_EMOJI[m.time]||"🍽️"}</div>
      <div class="hist-info">
        <div class="hist-title">${m.items?m.items.map(x=>x.name).join(", "):m.menu||"Makanan"}</div>
        <div class="hist-sub">${m.time} · ${fmtD(m.date)}</div>
      </div>
      ${m.totalCal?`<span class="tag" style="background:rgba(252,211,77,.12);color:#fcd34d">${m.totalCal} kkal</span>`:""}
    </div>`;
  });

  document.getElementById("page-Makan").innerHTML=h;
  requestAnimationFrame(()=>{
    drawLine("ch-cal2",s.days7.map(d=>({v:d.cal,label:d.label})),"#fcd34d");
    if(selFood)calcFood(isUnit?1:100);
  });
}
function pickFood(name){
  selFood=name;render("Makan");
  // scroll to calc
  setTimeout(()=>{const el=document.querySelector(".cal-calc,[style*='rgba(45,212,191,.08)']");if(el)el.scrollIntoView({behavior:"smooth",block:"nearest"})},100);
}
function calcFood(qty){
  const fd=FOOD_DB[selFood];if(!fd)return;
  const el=document.getElementById("foodCalcResult");if(!el)return;
  const q=parseFloat(qty)||0;
  const unitG=FOOD_UNIT_G[selFood]||100;
  const mult=fd[5]==="gram"||fd[5]==="ml"?q/100:q*unitG/100;
  const cal=fd[0]*mult,p=fd[1]*mult,c=fd[2]*mult,f=fd[3]*mult;
  el.innerHTML=`
    <div class="macro-box"><div class="macro-val c-amber">${cal.toFixed(0)}</div><div class="macro-lbl">kkal</div></div>
    <div class="macro-box"><div class="macro-val c-sage">${p.toFixed(1)}</div><div class="macro-lbl">Protein</div></div>
    <div class="macro-box"><div class="macro-val c-sky">${c.toFixed(1)}</div><div class="macro-lbl">Karbo</div></div>
    <div class="macro-box"><div class="macro-val c-rose">${f.toFixed(1)}</div><div class="macro-lbl">Lemak</div></div>`;
}
function addFoodToMeal(){
  const fd=FOOD_DB[selFood];if(!fd)return;
  const qtyEl=document.getElementById("foodQty");
  const qty=parseFloat(qtyEl?.value)||1;
  const unitG=FOOD_UNIT_G[selFood]||100;
  const mult=fd[5]==="gram"||fd[5]==="ml"?qty/100:qty*unitG/100;
  mealItems.push({name:selFood,gram:qty,unit:fd[5],cal:fd[0]*mult,p:fd[1]*mult,c:fd[2]*mult,f:fd[3]*mult});
  selFood="";render("Makan");
}
function removeFoodItem(i){mealItems.splice(i,1);render("Makan")}
function clearMeal(){mealItems=[];render("Makan")}
function setMTime(t){mTime=t;render("Makan")}
function saveMeal(){
  if(!mealItems.length)return;
  const totalCal=Math.round(mealItems.reduce((s,x)=>s+x.cal,0));
  const dateEl=document.getElementById("mDate");
  meals.unshift({id:Date.now(),time:mTime,items:[...mealItems],totalCal,date:dateEl?.value||today()});
  mealItems=[];save();render("Makan");
}

// ══════════════════════════════════════════════════
// SARAN
// ══════════════════════════════════════════════════
function rSaran(s){
  let h=`<div style="height:14px"></div>
  <div class="card card-teal">
    <div class="sec-title">🔑 Anthropic API Key</div>
    <input id="apiKeyInput" class="inp" type="password" placeholder="sk-ant-..." value="${localStorage.getItem("pt_apikey")||""}">
    <p class="api-note">Key tersimpan di device kamu saja. Dapatkan di <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
    <button class="btn btn-teal" style="margin-top:10px" onclick="saveKey()">💾 Simpan Key</button>
  </div>
  <div class="card card-lavender">
    <div class="sec-title">✨ Saran Personal AI</div>
    <div style="font-size:12px;color:#94a3b8;margin-bottom:13px">AI analisis data kamu dan kasih saran actionable.</div>
    <div class="stat-grid" style="margin-bottom:13px">
      <div class="stat-box"><div class="lbl">SALDO</div><div style="font-size:13px;font-weight:700;color:${s.bal>=0?"#86efac":"#fda4af"};margin-top:3px">${fmtIDR(s.bal)}</div></div>
      <div class="stat-box"><div class="lbl">GYM 30H</div><div style="font-size:13px;font-weight:700;color:#7dd3fc;margin-top:3px">${s.gym30.length}x</div></div>
      <div class="stat-box"><div class="lbl">AVG KALORI</div><div style="font-size:13px;font-weight:700;color:#fcd34d;margin-top:3px">${s.avgCal||0} kkal</div></div>
      <div class="stat-box"><div class="lbl">KALORI BAKAR</div><div style="font-size:13px;font-weight:700;color:#c4b5fd;margin-top:3px">${s.totalBurned.toLocaleString("id-ID")}</div></div>
    </div>
    <button class="btn btn-lavender" id="saranBtn" onclick="mintaSaran()">✨ Minta Saran AI</button>
  </div>
  <div id="saranResult"></div>`;
  document.getElementById("page-Saran").innerHTML=h;
}
function saveKey(){const k=document.getElementById("apiKeyInput").value.trim();if(!k)return;localStorage.setItem("pt_apikey",k);alert("✅ API key tersimpan!")}
async function mintaSaran(){
  const key=localStorage.getItem("pt_apikey")||"";
  if(!key){alert("Masukkan API key dulu! 🔑");return}
  const btn=document.getElementById("saranBtn");btn.textContent="⏳ Menganalisis...";btn.disabled=true;
  const s=stats();
  const recentMeals=meals.slice(0,5).map(m=>m.items?m.items.map(x=>x.name).join(", "):"").join("; ");
  const prompt=`Kamu adalah asisten kesehatan & keuangan personal Gen Z Indonesia. Bahasa informal, relatable, actionable. Berikan 4 saran spesifik berdasarkan data nyata pengguna:

Keuangan (30 hari): Pemasukan ${fmtIDR(s.inc)}, Pengeluaran ${fmtIDR(s.exp)}, Saldo ${fmtIDR(s.bal)}, Pengeluaran terbesar: ${s.topCat||"tidak ada data"}
Gym (30 hari): ${s.gym30.length} sesi, terakhir gym: ${s.lastGym||"belum pernah"}, total kalori terbakar: ~${s.totalBurned} kkal
Kalori rata-rata (7 hari): ${s.avgCal||0} kkal/hari
Makanan terakhir dikonsumsi: ${recentMeals||"belum ada data"}

Format: 4 bullet poin, tiap poin mulai dengan emoji relevan, maks 2 kalimat, langsung to the point tanpa intro.`;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    const txt=data.content?.[0]?.text||"Tidak dapat memuat saran.";
    document.getElementById("saranResult").innerHTML=`<div class="card card-sage"><div style="font-size:13px;font-weight:700;color:#4ade80;margin-bottom:11px">💡 Saran untuk kamu</div><div class="saran-box">${txt}</div></div>`;
  }catch(e){document.getElementById("saranResult").innerHTML=`<div class="card"><div style="color:#fda4af;font-size:13px">Error: ${e.message}</div></div>`}
  btn.textContent="✨ Minta Saran AI";btn.disabled=false;
}

// ══════════════════════════════════════════════════

// ══════════════════════════════════════════════════
render("Dashboard");
</script>
