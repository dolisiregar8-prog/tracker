const fmtD=d=>new Date(d).toLocaleDateString("id-ID",{day:"numeric",month:"short"});

// Format angka dengan titik ribuan
function fmtNum(val){
  if(!val&&val!==0)return"";
  return parseInt(val).toLocaleString("id-ID");
}
function fmtIDR(n){
  return"Rp "+parseInt(n).toLocaleString("id-ID");
}
function parseNum(s){
  if(!s)return 0;
  return parseInt(s.replace(/\./g,"").replace(/,/g,""))||0;
}

// ── STATS ────────────────────────────────────────────────────────────
function stats(){
  const now=new Date(),d30=new Date(now-30*864e5).toISOString().split("T")[0],d7=new Date(now-7*864e5).toISOString().split("T")[0];
  const fin30=finance.filter(f=>f.date>=d30);
  const inc=fin30.filter(f=>f.type==="Pemasukan").reduce((s,f)=>s+f.amount,0);
  const exp=fin30.filter(f=>f.type==="Pengeluaran").reduce((s,f)=>s+f.amount,0);
  const expByCat={};
  fin30.filter(f=>f.type==="Pengeluaran").forEach(f=>{expByCat[f.category]=(expByCat[f.category]||0)+f.amount});
  const gym30=gym.filter(g=>g.date>=d30);
  const meals7=meals.filter(m=>m.date>=d7);
  const dc=Math.max(1,[...new Set(meals7.map(m=>m.date))].length);
  const avgCal=Math.round(meals7.reduce((s,m)=>s+m.calories,0)/dc);
  const skipped=MEAL_TIMES.find(t=>!meals7.some(m=>m.time===t))||null;
  const topCat=Object.entries(expByCat).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const days7=Array.from({length:7},(_,i)=>{
    const d=new Date(now-(6-i)*864e5).toISOString().split("T")[0];
    return{d,label:fmtD(d).split(" ")[0],
      spend:finance.filter(f=>f.date===d&&f.type==="Pengeluaran").reduce((s,f)=>s+f.amount,0),
      income:finance.filter(f=>f.date===d&&f.type==="Pemasukan").reduce((s,f)=>s+f.amount,0),
      gymMin:gym.filter(g=>g.date===d).reduce((s,g)=>s+g.duration,0),
      cal:meals.filter(m=>m.date===d).reduce((s,m)=>s+m.calories,0),
    };
  });
  return{inc,exp,bal:inc-exp,expByCat,gym30,avgCal,skipped,topCat,days7,lastGym:gym[0]?.date?fmtD(gym[0].date):null};
}

// ── CHART ────────────────────────────────────────────────────────────
function drawLine(canvasId,data,color){
  const c=document.getElementById(canvasId);if(!c)return;
  const ctx=c.getContext("2d"),W=c.width,H=c.height,pad=18;
  ctx.clearRect(0,0,W,H);
  const vals=data.map(d=>d.v),max=Math.max(...vals,1),range=max||1;
  const pts=data.map((d,i)=>({x:pad+(i/(data.length-1))*(W-pad*2),y:H-pad-(d.v/range)*(H-pad*2),...d}));
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,color+"55");grad.addColorStop(1,color+"00");
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){const mx=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(mx,pts[i-1].y,mx,pts[i].y,pts[i].x,pts[i].y)}
  ctx.lineTo(pts[pts.length-1].x,H);ctx.lineTo(pts[0].x,H);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){const mx=(pts[i-1].x+pts[i].x)/2;ctx.bezierCurveTo(mx,pts[i-1].y,mx,pts[i].y,pts[i].x,pts[i].y)}
  ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.stroke();
  pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.strokeStyle="#0a0a0f";ctx.lineWidth=2;ctx.stroke();
    if(p.label){ctx.fillStyle="#6b7280";ctx.font="9px -apple-system";ctx.textAlign="center";ctx.fillText(p.label,p.x,H-2)}});
}
function drawDonut(canvasId,data){
  const c=document.getElementById(canvasId);if(!c)return;
  const ctx=c.getContext("2d"),W=c.width,H=c.height,r=W*.35,cx=W/2,cy=H/2;
  ctx.clearRect(0,0,W,H);
  const total=data.reduce((s,d)=>s+d.v,0)||1;
  let start=-Math.PI/2;
  data.forEach(d=>{const a=(d.v/total)*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+a);ctx.closePath();ctx.fillStyle=d.color;ctx.fill();start+=a});
  ctx.beginPath();ctx.arc(cx,cy,r*.65,0,Math.PI*2);ctx.fillStyle="#0a0a0f";ctx.fill();
  ctx.fillStyle="#fff";ctx.font="bold 14px -apple-system";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(data.length,cx,cy-6);
  ctx.fillStyle="#6b7280";ctx.font="9px -apple-system";ctx.fillText("kategori",cx,cy+8);
}

  const btn=document.getElementById("saranBtn");btn.textContent="⏳ Lagi dianalisis...";btn.disabled=true;
  const s=stats();
  const totalBurned=gym.filter(g=>g.caloriesBurned).reduce((sum,g)=>sum+g.caloriesBurned,0);
  const prompt=`Kamu adalah asisten keuangan dan kesehatan personal untuk Gen Z Indonesia. Bahasa informal tapi actionable. Berikan 4 saran konkret berdasarkan:
Keuangan (30 hari): Pemasukan ${fmtIDR(s.inc)}, Pengeluaran ${fmtIDR(s.exp)}, Saldo ${fmtIDR(s.bal)}, Kategori terbesar: ${s.topCat||"tidak ada"}
Gym (30 hari): ${s.gym30.length} sesi, terakhir: ${s.lastGym||"belum pernah"}, total kalori terbakar: ~${totalBurned} kkal
Kalori rata-rata/hari (7 hari): ${s.avgCal||0} kkal. Waktu makan sering dilewat: ${s.skipped||"tidak ada"}
Format: 4 bullet point dengan emoji relevan di awal, max 2 kalimat per poin.`;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    const txt=data.content?.[0]?.text||"Tidak dapat memuat saran.";
    document.getElementById("saranResult").innerHTML=`<div class="card"><div style="font-size:14px;font-weight:700;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px">💡 Ini saran buat kamu</div><div class="saran-box">${txt}</div></div>`;
  }catch(e){document.getElementById("saranResult").innerHTML=`<div class="card"><div style="color:#f43f5e;font-size:13px">Error: ${e.message}</div></div>`}
  btn.textContent="✨ Minta Saran AI";btn.disabled=false;
}

// ── INIT ─────────────────────────────────────────────────────────────
render("Dashboard");
</script>
</body>
</html>
