<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tracker">
<title>Personal Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#0a0a0f;color:#f1f0ff;font-family:-apple-system,'Inter',sans-serif;min-height:100vh;padding-bottom:90px;padding-top:env(safe-area-inset-top)}
  input,select,button{font-family:inherit;outline:none}
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

  /* BG blobs */
  .blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
  .b1{top:-80px;left:-80px;width:260px;height:260px;background:radial-gradient(circle,rgba(168,85,247,.18) 0%,transparent 70%)}
  .b2{top:180px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(6,182,212,.12) 0%,transparent 70%)}
  .b3{bottom:120px;left:30%;width:180px;height:180px;background:radial-gradient(circle,rgba(236,72,153,.1) 0%,transparent 70%)}

  .wrap{position:relative;z-index:1;padding:0 14px}

  /* Header */
  .hdr{padding:20px 14px 0;position:relative;z-index:1}
  .hdr h1{font-size:21px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .hdr p{font-size:12px;color:#6b7280;margin-top:2px}

  /* Glass card */
  .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:16px;margin-bottom:12px}
  .card-grad{background:linear-gradient(135deg,rgba(168,85,247,.15),rgba(236,72,153,.15))}

  /* Labels */
  .lbl{font-size:10px;color:#6b7280;font-weight:700;letter-spacing:.8px;margin-bottom:5px}

  /* Inputs */
  .inp{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 14px;color:#f1f0ff;font-size:14px;margin-bottom:12px}
  .inp:focus{border-color:rgba(168,85,247,.5)}
  select.inp option{background:#1a1a2e;color:#f1f0ff}

  /* Buttons */
  .btn{width:100%;border:none;border-radius:12px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;color:#fff}
  .btn-purple{background:linear-gradient(135deg,#a855f7,#ec4899)}
  .btn-green{background:linear-gradient(135deg,#10b981,#06b6d4)}
  .btn-red{background:linear-gradient(135deg,#f43f5e,#f97316)}
  .btn-cyan{background:linear-gradient(135deg,#06b6d4,#6366f1)}
  .btn-yellow{background:linear-gradient(135deg,#f59e0b,#f97316)}
  .btn-sm{width:auto;padding:7px 14px;font-size:12px;border-radius:10px}

  /* Type toggle */
  .type-row{display:flex;gap:8px;margin-bottom:14px}
  .type-btn{flex:1;padding:10px;border-radius:12px;font-weight:700;font-size:13px;cursor:pointer;border:none;color:#fff;background:rgba(255,255,255,.06)}
  .type-btn.active-income{background:linear-gradient(135deg,#10b981,#06b6d4)}
  .type-btn.active-expense{background:linear-gradient(135deg,#f43f5e,#f97316)}

  /* Pill tags */
  .pill{display:inline-block;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700}
  .pill-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .pill-sel{border:none;cursor:pointer;padding:7px 13px;border-radius:20px;font-size:12px;font-weight:600;color:#fff;background:rgba(255,255,255,.07)}

  /* Stats grid */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .stat-box{background:rgba(255,255,255,.04);border-radius:14px;padding:12px}
  .stat-val{font-size:22px;font-weight:800;margin-top:2px}
  .grad-purple{background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .grad-cyan{background:linear-gradient(135deg,#06b6d4,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .grad-green{background:linear-gradient(135deg,#10b981,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .grad-red{background:linear-gradient(135deg,#f43f5e,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .grad-yellow{background:linear-gradient(135deg,#f59e0b,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

  /* History item */
  .hist-item{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .hist-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
  .hist-info{flex:1;margin-left:10px}
  .hist-title{font-size:13px;font-weight:600}
  .hist-sub{font-size:11px;color:#6b7280;margin-top:1px}
  .hist-amt{font-size:14px;font-weight:700;text-align:right}

  /* Chart */
  canvas{border-radius:12px}

  /* Bottom nav */
  .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-around;padding:10px 0;padding-bottom:max(14px,env(safe-area-inset-bottom));z-index:100}
  .nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;opacity:.4;transition:opacity .2s}
  .nav-btn.active{opacity:1}
  .nav-icon{font-size:22px}
  .nav-lbl{font-size:10px;color:#6b7280;font-weight:600}
  .nav-btn.active .nav-lbl{color:#a855f7}
  .nav-dot{width:4px;height:4px;border-radius:50%;background:linear-gradient(135deg,#a855f7,#ec4899)}

  /* Saran */
  .saran-box{font-size:13px;line-height:1.8;white-space:pre-wrap;color:#f1f0ff}
  .saran-title{font-size:14px;font-weight:700;background:linear-gradient(135deg,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}

  /* API key section */
  .api-note{font-size:11px;color:#6b7280;margin-top:8px;line-height:1.6}
  .api-note a{color:#a855f7}

  .section-title{font-size:13px;font-weight:700;margin-bottom:10px;padding-left:2px}
  .empty{color:#6b7280;font-size:13px;text-align:center;padding:30px 0}
</style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="hdr">
  <h1>Personal Tracker ✦</h1>
  <p id="dateLabel"></p>
</div>

<!-- PAGES -->
<div class="wrap" id="page-Dashboard" style="display:block"></div>
<div class="wrap" id="page-Keuangan" style="display:none"></div>
<div class="wrap" id="page-Gym" style="display:none"></div>
<div class="wrap" id="page-Makan" style="display:none"></div>
<div class="wrap" id="page-Saran" style="display:none"></div>

<!-- Bottom Nav -->
<nav class="nav">
  <button class="nav-btn active" onclick="switchTab('Dashboard')">
    <span class="nav-icon">⚡</span><span class="nav-lbl">Dashboard</span><span class="nav-dot" id="dot-Dashboard"></span>
  </button>
  <button class="nav-btn" onclick="switchTab('Keuangan')">
    <span class="nav-icon">💸</span><span class="nav-lbl">Keuangan</span><span class="nav-dot" id="dot-Keuangan" style="display:none"></span>
  </button>
  <button class="nav-btn" onclick="switchTab('Gym')">
    <span class="nav-icon">🏋️</span><span class="nav-lbl">Gym</span><span class="nav-dot" id="dot-Gym" style="display:none"></span>
  </button>
  <button class="nav-btn" onclick="switchTab('Makan')">
    <span class="nav-icon">🍜</span><span class="nav-lbl">Makan</span><span class="nav-dot" id="dot-Makan" style="display:none"></span>
  </button>
  <button class="nav-btn" onclick="switchTab('Saran')">
    <span class="nav-icon">✨</span><span class="nav-lbl">Saran</span><span class="nav-dot" id="dot-Saran" style="display:none"></span>
  </button>
</nav>

<script>
// ─── DATA ───────────────────────────────────────────────
const EXPENSE_CATS = ["Makan","Transportasi","Hiburan","Belanja","Kesehatan","Lainnya"];
const INCOME_CATS  = ["Gaji","Freelance","Investasi","Lainnya"];
const WORKOUT_TYPES= ["Chest","Back","Legs","Shoulders","Arms","Cardio","Full Body","Lainnya"];
const MEAL_TIMES   = ["Sarapan","Makan Siang","Makan Malam","Snack"];
const CAT_COLOR    = {Makan:"#f97316",Transportasi:"#06b6d4",Hiburan:"#a855f7",Belanja:"#ec4899",Kesehatan:"#10b981",Lainnya:"#6b7280",Gaji:"#10b981",Freelance:"#06b6d4",Investasi:"#f59e0b",Chest:"#f43f5e",Back:"#a855f7",Legs:"#06b6d4",Shoulders:"#f59e0b",Arms:"#10b981",Cardio:"#ec4899","Full Body":"#6366f1"};
const MEAL_EMOJI   = {Sarapan:"🌅","Makan Siang":"☀️","Makan Malam":"🌙",Snack:"🍪"};
const FOOD_EMOJI   = {Makan:"🍜",Transportasi:"🚗",Hiburan:"🎮",Belanja:"🛍️",Kesehatan:"💊"};

let finance = JSON.parse(localStorage.getItem("pt_finance")||"[]");
let gym     = JSON.parse(localStorage.getItem("pt_gym")||"[]");
let meals   = JSON.parse(localStorage.getItem("pt_meals")||"[]");
let apiKey  = localStorage.getItem("pt_apikey")||"";

const save = () => {
  localStorage.setItem("pt_finance", JSON.stringify(finance));
  localStorage.setItem("pt_gym",     JSON.stringify(gym));
  localStorage.setItem("pt_meals",   JSON.stringify(meals));
};

const today = () => new Date().toISOString().split("T")[0];
const fmtIDR = n => new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR",maximumFractionDigits:0}).format(n);
const fmtD   = d => new Date(d).toLocaleDateString("id-ID",{day:"numeric",month:"short"});

document.getElementById("dateLabel").textContent =
  new Date().toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

// ─── STATS ──────────────────────────────────────────────
function stats() {
  const now = new Date(), d30 = new Date(now-30*864e5).toISOString().split("T")[0], d7 = new Date(now-7*864e5).toISOString().split("T")[0];
  const fin30 = finance.filter(f=>f.date>=d30);
  const inc = fin30.filter(f=>f.type==="Pemasukan").reduce((s,f)=>s+f.amount,0);
  const exp = fin30.filter(f=>f.type==="Pengeluaran").reduce((s,f)=>s+f.amount,0);
  const expByCat={};
  fin30.filter(f=>f.type==="Pengeluaran").forEach(f=>{expByCat[f.category]=(expByCat[f.category]||0)+f.amount});
  const gym30=gym.filter(g=>g.date>=d30);
  const meals7=meals.filter(m=>m.date>=d7);
  const dc=Math.max(1,[...new Set(meals7.map(m=>m.date))].length);
  const avgCal=Math.round(meals7.reduce((s,m)=>s+m.calories,0)/dc);
  const skipped=MEAL_TIMES.find(t=>!meals7.some(m=>m.time===t))||null;
  const topCat=Object.entries(expByCat).sort((a,b)=>b[1]-a[1])[0]?.[0];

  // 7-day arrays
  const days7=Array.from({length:7},(_,i)=>{
    const d=new Date(now-(6-i)*864e5).toISOString().split("T")[0];
    return {
      d, label:fmtD(d).split(" ")[0],
      spend:finance.filter(f=>f.date===d&&f.type==="Pengeluaran").reduce((s,f)=>s+f.amount,0),
      income:finance.filter(f=>f.date===d&&f.type==="Pemasukan").reduce((s,f)=>s+f.amount,0),
      gymMin:gym.filter(g=>g.date===d).reduce((s,g)=>s+g.duration,0),
      cal:meals.filter(m=>m.date===d).reduce((s,m)=>s+m.calories,0),
    };
  });
  return {inc,exp,bal:inc-exp,expByCat,gym30,avgCal,skipped,topCat,days7,lastGym:gym[0]?.date?fmtD(gym[0].date):null};
}

// ─── CHART ──────────────────────────────────────────────
function drawLine(canvasId, data, color) {
  const c = document.getElementById(canvasId); if(!c) return;
  const ctx = c.getContext("2d");
  const W=c.width, H=c.height, pad=18;
  ctx.clearRect(0,0,W,H);
  const vals=data.map(d=>d.v);
  const max=Math.max(...vals,1), min=0, range=max-min||1;
  const pts=data.map((d,i)=>({
    x: pad+(i/(data.length-1))*(W-pad*2),
    y: H-pad-((d.v-min)/range)*(H-pad*2),
    ...d
  }));
  // area
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,color+"55"); grad.addColorStop(1,color+"00");
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){
    const mx=(pts[i-1].x+pts[i].x)/2;
    ctx.bezierCurveTo(mx,pts[i-1].y,mx,pts[i].y,pts[i].x,pts[i].y);
  }
  ctx.lineTo(pts[pts.length-1].x,H); ctx.lineTo(pts[0].x,H); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();
  // line
  ctx.beginPath();
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){
    const mx=(pts[i-1].x+pts[i].x)/2;
    ctx.bezierCurveTo(mx,pts[i-1].y,mx,pts[i].y,pts[i].x,pts[i].y);
  }
  ctx.strokeStyle=color; ctx.lineWidth=2.5; ctx.lineJoin="round"; ctx.stroke();
  // dots + labels
  pts.forEach((p,i)=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2);
    ctx.fillStyle=color; ctx.fill();
    ctx.strokeStyle="#0a0a0f"; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle="#6b7280"; ctx.font="9px -apple-system,Inter,sans-serif";
    ctx.textAlign="center"; ctx.fillText(p.label,p.x,H-2);
  });
}

function drawDonut(canvasId, data) {
  const c=document.getElementById(canvasId); if(!c) return;
  const ctx=c.getContext("2d"), W=c.width,H=c.height, r=W*.35, cx=W/2,cy=H/2;
  ctx.clearRect(0,0,W,H);
  const total=data.reduce((s,d)=>s+d.v,0)||1;
  let start=-Math.PI/2;
  data.forEach(d=>{
    const angle=(d.v/total)*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,start+angle);
    ctx.closePath(); ctx.fillStyle=d.color; ctx.fill();
    start+=angle;
  });
  // hole
  ctx.beginPath(); ctx.arc(cx,cy,r*.65,0,Math.PI*2);
  ctx.fillStyle="#0a0a0f"; ctx.fill();
  // center text
  ctx.fillStyle="#fff"; ctx.font="bold 14px -apple-system";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(data.length, cx, cy-6);
  ctx.fillStyle="#6b7280"; ctx.font="9px -apple-system";
  ctx.fillText("kategori", cx, cy+8);
}

// ─── TAB SWITCH ─────────────────────────────────────────
let curTab="Dashboard";
function switchTab(t) {
  document.getElementById("page-"+curTab).style.display="none";
  document.querySelector(`.nav-btn:nth-child(${["Dashboard","Keuangan","Gym","Makan","Saran"].indexOf(curTab)+1})`).classList.remove("active");
  document.getElementById("dot-"+curTab).style.display="none";
  curTab=t;
  document.getElementById("page-"+t).style.display="block";
  document.querySelector(`.nav-btn:nth-child(${["Dashboard","Keuangan","Gym","Makan","Saran"].indexOf(t)+1})`).classList.add("active");
  document.getElementById("dot-"+t).style.display="block";
  render(t);
}

// ─── RENDER ─────────────────────────────────────────────
function render(t) {
  const s=stats();
  if(t==="Dashboard") renderDashboard(s);
  else if(t==="Keuangan") renderKeuangan(s);
  else if(t==="Gym") renderGym(s);
  else if(t==="Makan") renderMakan(s);
  else if(t==="Saran") renderSaran(s);
}

function h(tag,cls,inner,style="") {
  return `<${tag} class="${cls}" style="${style}">${inner}</${tag}>`;
}

// DASHBOARD
function renderDashboard(s) {
  const balColor = s.bal>=0?"#10b981":"#f43f5e";
  let html = `
  <div style="height:14px"></div>
  <div class="card card-grad" style="position:relative;overflow:hidden">
    <div class="lbl">SALDO BERSIH (30 HARI)</div>
    <div style="font-size:28px;font-weight:800;color:${balColor};margin:4px 0">${fmtIDR(s.bal)}</div>
    <div style="display:flex;gap:16px;margin-top:4px">
      <span style="font-size:12px;color:#10b981">▲ ${fmtIDR(s.inc)}</span>
      <span style="font-size:12px;color:#f43f5e">▼ ${fmtIDR(s.exp)}</span>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Pengeluaran 7 Hari</div>
    <canvas id="ch-spend" width="320" height="90" style="width:100%;height:90px"></canvas>
  </div>
  <div class="card">
    <div class="section-title">Pemasukan 7 Hari</div>
    <canvas id="ch-income" width="320" height="90" style="width:100%;height:90px"></canvas>
  </div>`;

  const donutData=Object.entries(s.expByCat).map(([k,v])=>({label:k,v,color:CAT_COLOR[k]||"#6b7280"}));
  if(donutData.length>0){
    let legend=donutData.sort((a,b)=>b.v-a.v).map(d=>`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
        <div style="display:flex;align-items:center;gap:7px">
          <div style="width:9px;height:9px;border-radius:50%;background:${d.color}"></div>
          <span style="font-size:12px">${d.label}</span>
        </div>
        <span style="font-size:12px;color:#6b7280">${Math.round(d.v/(s.exp||1)*100)}%</span>
      </div>`).join("");
    html+=`<div class="card">
      <div class="section-title">Komposisi Pengeluaran</div>
      <div style="display:flex;gap:12px;align-items:center">
        <canvas id="ch-donut" width="110" height="110" style="flex-shrink:0"></canvas>
        <div style="flex:1">${legend}</div>
      </div>
    </div>`;
  }

  html+=`
  <div class="stat-grid">
    <div class="stat-box">
      <div class="lbl">GYM (30H)</div>
      <div class="stat-val grad-cyan">${s.gym30.length}x</div>
      <canvas id="ch-gym-s" width="80" height="28" style="width:80px;height:28px;margin-top:4px"></canvas>
    </div>
    <div class="stat-box">
      <div class="lbl">KALORI/HARI</div>
      <div class="stat-val grad-yellow">${s.avgCal||0}</div>
      <canvas id="ch-cal-s" width="80" height="28" style="width:80px;height:28px;margin-top:4px"></canvas>
    </div>
  </div>
  <div class="card">
    <div class="section-title">Durasi Gym 7 Hari (menit)</div>
    <canvas id="ch-gym" width="320" height="90" style="width:100%;height:90px"></canvas>
  </div>
  <div class="card">
    <div class="section-title">Kalori 7 Hari</div>
    <canvas id="ch-cal" width="320" height="90" style="width:100%;height:90px"></canvas>
  </div>`;

  document.getElementById("page-Dashboard").innerHTML=html;
  requestAnimationFrame(()=>{
    drawLine("ch-spend",  s.days7.map(d=>({v:d.spend, label:d.label})),  "#f43f5e");
    drawLine("ch-income", s.days7.map(d=>({v:d.income,label:d.label})), "#10b981");
    drawLine("ch-gym",    s.days7.map(d=>({v:d.gymMin,label:d.label})), "#06b6d4");
    drawLine("ch-cal",    s.days7.map(d=>({v:d.cal,   label:d.label})), "#f59e0b");
    drawLine("ch-gym-s",  s.days7.map(d=>({v:d.gymMin,label:""})),      "#06b6d4");
    drawLine("ch-cal-s",  s.days7.map(d=>({v:d.cal,   label:""})),      "#f59e0b");
    if(document.getElementById("ch-donut"))
      drawDonut("ch-donut", Object.entries(s.expByCat).map(([k,v])=>({v,color:CAT_COLOR[k]||"#6b7280"})));
  });
}

// KEUANGAN
let fType="Pengeluaran";
function renderKeuangan(s) {
  const cats = fType==="Pemasukan"?INCOME_CATS:EXPENSE_CATS;
  let savedCat = document.getElementById("fCat")?.value || cats[0];
  let html=`
  <div style="height:14px"></div>
  <div class="card">
    <div class="section-title">💸 Catat Transaksi</div>
    <div class="type-row">
      <button class="type-btn ${fType==='Pemasukan'?'active-income':''}" onclick="setFType('Pemasukan')">Pemasukan</button>
      <button class="type-btn ${fType==='Pengeluaran'?'active-expense':''}" onclick="setFType('Pengeluaran')">Pengeluaran</button>
    </div>
    <div class="lbl">JUMLAH (RP)</div>
    <input id="fAmt" class="inp" type="number" inputmode="numeric" placeholder="0">
    <div class="lbl">KATEGORI</div>
    <select id="fCat" class="inp">${cats.map(c=>`<option${c===savedCat?" selected":""}>${c}</option>`).join("")}</select>
    <div class="lbl">CATATAN</div>
    <input id="fNote" class="inp" placeholder="Opsional">
    <div class="lbl">TANGGAL</div>
    <input id="fDate" class="inp" type="date" value="${today()}">
    <button class="btn ${fType==='Pemasukan'?'btn-green':'btn-red'}" onclick="addFinance()">+ Tambah ${fType}</button>
  </div>
  <div class="card">
    <div class="section-title">Pengeluaran 7 Hari</div>
    <canvas id="ch-keu" width="320" height="80" style="width:100%;height:80px"></canvas>
  </div>
  <div class="section-title">Riwayat</div>`;

  if(!finance.length) html+=`<div class="empty">Belum ada transaksi 🫙</div>`;
  finance.slice(0,40).forEach(f=>{
    const ic=f.type==="Pemasukan"?"💰":(FOOD_EMOJI[f.category]||"💳");
    const col=f.type==="Pemasukan"?"#10b981":"#f43f5e";
    html+=`<div class="card hist-item">
      <div class="hist-icon" style="background:${CAT_COLOR[f.category]||"#6b7280"}22">${ic}</div>
      <div class="hist-info">
        <div class="hist-title">${f.category}${f.note?` · ${f.note}`:""}</div>
        <div class="hist-sub">${fmtD(f.date)}</div>
      </div>
      <div class="hist-amt" style="color:${col}">${f.type==="Pemasukan"?"+":"-"}${fmtIDR(f.amount)}</div>
    </div>`;
  });
  document.getElementById("page-Keuangan").innerHTML=html;
  requestAnimationFrame(()=>drawLine("ch-keu",s.days7.map(d=>({v:d.spend,label:d.label})),"#f43f5e"));
}
function setFType(t){fType=t;render("Keuangan")}
function addFinance(){
  const amt=+document.getElementById("fAmt").value;
  if(!amt)return;
  finance.unshift({id:Date.now(),type:fType,amount:amt,
    category:document.getElementById("fCat").value,
    note:document.getElementById("fNote").value,
    date:document.getElementById("fDate").value});
  save(); render("Keuangan");
}

// GYM
let gType="Chest";

  let html=`
  <div style="height:14px"></div>
  <div class="card">
    <div class="section-title">🏋️ Catat Sesi Gym</div>
    <div class="pill-wrap">${pills}</div>
    <div class="lbl">DURASI (MENIT)</div>
    <input id="gDur" class="inp" type="number" inputmode="numeric" placeholder="60">
    <div class="lbl">CATATAN</div>
    <input id="gNote" class="inp" placeholder="3 set bench press, dsb.">
    <div class="lbl">TANGGAL</div>
    <input id="gDate" class="inp" type="date" value="${today()}">
    <button class="btn btn-cyan" onclick="addGym()">+ Tambah Sesi</button>
  </div>
  <div class="card">
    <div class="section-title">Durasi Gym 7 Hari</div>
    <canvas id="ch-gym2" width="320" height="80" style="width:100%;height:80px"></canvas>
  </div>
  <div class="section-title">Riwayat Gym</div>`;
  if(!gym.length) html+=`<div class="empty">Ayo mulai gym! 💪</div>`;
  gym.slice(0,30).forEach(g=>{
    html+=`<div class="card hist-item">
      <div class="hist-icon" style="background:${CAT_COLOR[g.type]||"#06b6d4"}22">💪</div>
      <div class="hist-info">
        <div class="hist-title">${g.type}</div>
        <div class="hist-sub">${g.note?g.note+" · ":""}${fmtD(g.date)}</div>
      </div>
      <span class="pill" style="background:${CAT_COLOR[g.type]||"#06b6d4"}22;color:${CAT_COLOR[g.type]||"#06b6d4"}">${g.duration} mnt</span>
    </div>`;
  });
  document.getElementById("page-Gym").innerHTML=html;
  requestAnimationFrame(()=>drawLine("ch-gym2",s.days7.map(d=>({v:d.gymMin,label:d.label})),"#06b6d4"));
}
function setGType(t){gType=t;render("Gym")}
function addGym(){
  const dur=+document.getElementById("gDur").value;
  if(!dur)return;
  gym.unshift({id:Date.now(),type:gType,duration:dur,
    note:document.getElementById("gNote").value,
    date:document.getElementById("gDate").value});
  save(); render("Gym");
}

// MAKAN
let mTime="Sarapan";
function renderMakan(s) {
  const pills=MEAL_TIMES.map(t=>`<button class="pill-sel" style="${mTime===t?"background:linear-gradient(135deg,#f59e0b,#f97316);":""}" onclick="setMTime('${t}')">${t}</button>`).join("");
  let html=`
  <div style="height:14px"></div>
  <div class="card">
    <div class="section-title">🍜 Catat Makan</div>
    <div class="pill-wrap">${pills}</div>
    <div class="lbl">MENU</div>
    <input id="mMenu" class="inp" placeholder="Nasi goreng, ayam bakar, dll.">
    <div class="lbl">ESTIMASI KALORI (KKAL)</div>
    <input id="mCal" class="inp" type="number" inputmode="numeric" placeholder="500">
    <div class="lbl">TANGGAL</div>
    <input id="mDate" class="inp" type="date" value="${today()}">
    <button class="btn btn-yellow" onclick="addMeal()">+ Tambah Makanan</button>
  </div>
  <div class="card">
    <div class="section-title">Kalori 7 Hari</div>
    <canvas id="ch-cal2" width="320" height="80" style="width:100%;height:80px"></canvas>
  </div>
  <div class="section-title">Riwayat Makan</div>`;
  if(!meals.length) html+=`<div class="empty">Belum ada log makan 🍽️</div>`;
  meals.slice(0,30).forEach(m=>{
    html+=`<div class="card hist-item">
      <div class="hist-icon" style="background:#f59e0b22">${MEAL_EMOJI[m.time]||"🍽️"}</div>
      <div class="hist-info">
        <div class="hist-title">${m.menu}</div>
        <div class="hist-sub">${m.time} · ${fmtD(m.date)}</div>
      </div>
      ${m.calories?`<span class="pill" style="background:#f59e0b22;color:#f59e0b">${m.calories} kkal</span>`:""}
    </div>`;
  });
  document.getElementById("page-Makan").innerHTML=html;
  requestAnimationFrame(()=>drawLine("ch-cal2",s.days7.map(d=>({v:d.cal,label:d.label})),"#f59e0b"));
}
function setMTime(t){mTime=t;render("Makan")}
function addMeal(){
  const menu=document.getElementById("mMenu").value.trim();
  if(!menu)return;
  meals.unshift({id:Date.now(),time:mTime,menu,
    calories:+document.getElementById("mCal").value||0,
    date:document.getElementById("mDate").value});
  save(); render("Makan");
}

// SARAN
function renderSaran(s) {
  const savedKey=localStorage.getItem("pt_apikey")||"";
  const maskedKey=savedKey?savedKey.slice(0,8)+"••••••••••••":"";
  let html=`
  <div style="height:14px"></div>
  <div class="card card-grad">
    <div class="section-title">🔑 Anthropic API Key</div>
    <input id="apiKeyInput" class="inp" type="password" placeholder="sk-ant-..." value="${savedKey}">
    <p class="api-note">API key kamu disimpan di iPhone kamu saja (localStorage). Tidak dikirim ke mana pun kecuali ke api.anthropic.com. Dapatkan key di <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
    <button class="btn btn-purple" style="margin-top:12px" onclick="saveApiKey()">💾 Simpan API Key</button>
  </div>
  <div class="card card-grad">
    <div class="section-title">✨ Saran Personal AI</div>
    <div style="font-size:12px;color:#6b7280;margin-bottom:14px">AI analisis pola keuangan & aktivitas kamu.</div>
    <div class="stat-grid" style="margin-bottom:14px">
      <div class="stat-box"><div class="lbl">SALDO</div><div style="font-size:14px;font-weight:700;color:${s.bal>=0?"#10b981":"#f43f5e"};margin-top:2px">${fmtIDR(s.bal)}</div></div>
      <div class="stat-box"><div class="lbl">GYM 30H</div><div style="font-size:14px;font-weight:700;color:#06b6d4;margin-top:2px">${s.gym30.length}x</div></div>
      <div class="stat-box"><div class="lbl">AVG KALORI</div><div style="font-size:14px;font-weight:700;color:#f59e0b;margin-top:2px">${s.avgCal||0} kkal</div></div>
      <div class="stat-box"><div class="lbl">TOP SPEND</div><div style="font-size:14px;font-weight:700;color:#ec4899;margin-top:2px">${s.topCat||"-"}</div></div>
    </div>
    <button class="btn btn-purple" id="saranBtn" onclick="mintaSaran()">✨ Minta Saran AI</button>
  </div>
  <div id="saranResult"></div>`;
  document.getElementById("page-Saran").innerHTML=html;
}
function saveApiKey(){
  const k=document.getElementById("apiKeyInput").value.trim();
  if(!k)return;
  localStorage.setItem("pt_apikey",k);
  alert("✅ API key tersimpan!");
}
async function mintaSaran(){
  const key=localStorage.getItem("pt_apikey")||"";
  if(!key){alert("Masukkan API key dulu ya! 🔑");return;}
  const btn=document.getElementById("saranBtn");
  btn.textContent="⏳ Lagi dianalisis..."; btn.disabled=true;
  const s=stats();
  const prompt=`Kamu adalah asisten keuangan dan kesehatan personal untuk Gen Z Indonesia. Berikan saran yang relatable dan friendly dalam Bahasa Indonesia-informal. Berikan 4 saran konkret berdasarkan:

Keuangan (30 hari): Pemasukan ${fmtIDR(s.inc)}, Pengeluaran ${fmtIDR(s.exp)}, Saldo ${fmtIDR(s.bal)}, Kategori terbesar: ${s.topCat||"tidak ada"}
Gym (30 hari): ${s.gym30.length} sesi, terakhir: ${s.lastGym||"belum pernah"}
Kalori rata-rata/hari (7 hari): ${s.avgCal||0} kkal
Waktu makan sering dilewat: ${s.skipped||"tidak ada"}

Format: 4 bullet point, tiap poin ada emoji relevan di awal, max 2 kalimat.`;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:prompt}]})
    });
    const data=await res.json();
    const txt=data.content?.[0]?.text||"Tidak dapat memuat saran.";
    document.getElementById("saranResult").innerHTML=`
      <div class="card">
        <div class="saran-title">💡 Ini saran buat kamu</div>
        <div class="saran-box">${txt}</div>
      </div>`;
  }catch(e){
    document.getElementById("saranResult").innerHTML=`<div class="card"><div style="color:#f43f5e;font-size:13px">Error: ${e.message}</div></div>`;
  }
  btn.textContent="✨ Minta Saran AI"; btn.disabled=false;
}

// ─── INIT ────────────────────────────────────────────────
render("Dashboard");
</script>
